# NextWiki Docker Compose Configuration
# Production deployment with external volumes for backup and transport

services:
  # PostgreSQL Database
  postgres:
    image: postgres:17
    container_name: nextwiki-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-nextwiki}
      POSTGRES_USER: ${DB_USER:-nextwiki}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nextwiki_password}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      # External volume for data persistence - can be reconfigured
      - ${DATA_PATH:-./data}/postgres:/var/lib/postgresql/data
      # Configuration and backup volume
      - ${DATA_PATH:-./data}/postgres-config:/etc/postgresql
      - ${DATA_PATH:-./data}/backups:/backups
    networks:
      - nextwiki-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-nextwiki} -d ${DB_NAME:-nextwiki}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # NextWiki Web Application
  nextwiki:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nextwiki-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      # Database connection
      DATABASE_URL: postgresql://${DB_USER:-nextwiki}:${DB_PASSWORD:-nextwiki_password}@postgres:5432/${DB_NAME:-nextwiki}
      
      # NextAuth configuration
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      
      # OAuth providers
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      
      # Optional WebSocket URL for backend
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
      
      # Other configuration
      NODE_ENV: production
      NEXT_PUBLIC_DEV_MODE: false
      NEXT_PUBLIC_NODE_ENV: production
    volumes:
      # Application data and uploads (if needed)
      - ${DATA_PATH:-./data}/app-data:/app/data
    networks:
      - nextwiki-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Optional: NextWiki Backend (for WebSocket support)
  nextwiki-backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: nextwiki-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-nextwiki}:${DB_PASSWORD:-nextwiki_password}@postgres:5432/${DB_NAME:-nextwiki}
      NODE_ENV: production
      PORT: 3001
    networks:
      - nextwiki-network
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - backend  # Only start when specifically requested
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

# External volumes for easy backup and transport
volumes:
  postgres-data:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: ${DATA_PATH:-./data}/postgres
  app-data:
    driver: local
    driver_opts:
      o: bind
      type: none  
      device: ${DATA_PATH:-./data}/app-data

# Network for service communication
networks:
  nextwiki-network:
    driver: bridge